# Nginx Configuration for benigolfclub.com
# 
# INSTRUCTIONS:
# 1. Copy this file to /etc/nginx/sites-available/benigolfclub
# 2. Create symlink: sudo ln -sf /etc/nginx/sites-available/benigolfclub /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload nginx: sudo systemctl reload nginx
#
# IMPORTANT: Make sure the uploads directory exists and has correct permissions:
#   sudo mkdir -p /var/www/benigolfclub/backend/uploads
#   sudo chown -R www-data:www-data /var/www/benigolfclub/backend/uploads
#   sudo chmod -R 755 /var/www/benigolfclub/backend/uploads

server {
    listen 80;
    server_name benigolfclub.com www.benigolfclub.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name benigolfclub.com www.benigolfclub.com;
    
    # SSL Configuration (adjust paths to your certificates)
    ssl_certificate /etc/letsencrypt/live/benigolfclub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/benigolfclub.com/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    # Root directory for frontend
    root /var/www/benigolfclub/frontend/build;
    index index.html;
    
    # Max upload size (for videos)
    client_max_body_size 100M;
    
    # === CRITICAL: Serve uploaded files (images/videos) ===
    # This MUST come BEFORE the general /api proxy
    location /api/uploads/ {
        alias /var/www/benigolfclub/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Handle missing files gracefully
        try_files $uri =404;
    }
    
    # === Proxy all other /api requests to FastAPI backend ===
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for large uploads
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
    
    # === Serve frontend (React SPA) ===
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
